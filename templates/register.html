{% extends "base.html" %}

{% block title %}用户注册 - RL4CO强化学习优化平台{% endblock %}

{% block nav %}{% endblock %}

{% block head %}
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Microsoft YaHei', Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .register-container {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 450px;
        animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .logo-section {
        text-align: center;
        margin-bottom: 30px;
    }

    .university-badge {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 8px 20px;
        border-radius: 20px;
        font-size: 14px;
        display: inline-block;
        margin-bottom: 15px;
    }

    h1 {
        color: #333;
        font-size: 28px;
        margin-bottom: 10px;
        text-align: center;
    }

    .subtitle {
        color: #666;
        text-align: center;
        margin-bottom: 30px;
        font-size: 14px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        color: #555;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 500;
    }

    .required {
        color: #f56565;
    }

    input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        font-size: 15px;
        transition: all 0.3s;
        background: #f7fafc;
    }

    input:focus {
        outline: none;
        border-color: #667eea;
        background: white;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    input::placeholder {
        color: #a0aec0;
    }

    .password-strength {
        margin-top: 5px;
        font-size: 12px;
        color: #718096;
    }

    .strength-bar {
        height: 4px;
        background: #e2e8f0;
        border-radius: 2px;
        margin-top: 5px;
        overflow: hidden;
    }

    .strength-fill {
        height: 100%;
        width: 0;
        transition: all 0.3s;
        border-radius: 2px;
    }

    .strength-weak { background: #f56565; width: 33%; }
    .strength-medium { background: #ed8936; width: 66%; }
    .strength-strong { background: #48bb78; width: 100%; }

    .btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 10px;
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
    }

    .btn:active {
        transform: translateY(0);
    }

    .btn:disabled {
        background: #cbd5e0;
        cursor: not-allowed;
        transform: none;
    }

    .login-link {
        text-align: center;
        margin-top: 20px;
        color: #718096;
        font-size: 14px;
    }

    .login-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
    }

    .login-link a:hover {
        text-decoration: underline;
    }

    .alert {
        padding: 12px 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 14px;
        display: none;
    }

    .alert-success {
        background: #c6f6d5;
        color: #22543d;
        border: 1px solid #9ae6b4;
    }

    .alert-error {
        background: #fed7d7;
        color: #742a2a;
        border: 1px solid #fc8181;
    }

    .terms {
        font-size: 12px;
        color: #718096;
        margin-top: 15px;
        text-align: center;
        line-height: 1.6;
    }

    .terms a {
        color: #667eea;
        text-decoration: none;
    }

    /* 加载动画 */
    .loading {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid #ffffff;
        border-radius: 50%;
        border-top-color: transparent;
        animation: spin 0.6s linear infinite;
        margin-left: 10px;
        vertical-align: middle;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
</style>
{% endblock %}

{% block content %}
<div class="register-container">
    <div class="logo-section">
        <div class="university-badge">🎓 山西大学 · RL4CO</div>
        <h1>用户注册</h1>
        <p class="subtitle">RL4CO 强化学习优化平台</p>
    </div>

    <div id="alert" class="alert"></div>

    <form id="registerForm">
        <div class="form-group">
            <label for="username">
                用户名 <span class="required">*</span>
            </label>
            <input
                type="text"
                id="username"
                name="username"
                placeholder="请输入用户名（3-20个字符）"
                minlength="3"
                maxlength="20"
                required
                autocomplete="username"
            >
        </div>

        <div class="form-group">
            <label for="password">
                密码 <span class="required">*</span>
            </label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="请输入密码（至少6个字符）"
                minlength="6"
                required
                autocomplete="new-password"
            >
            <div class="strength-bar">
                <div id="strengthFill" class="strength-fill"></div>
            </div>
            <div id="strengthText" class="password-strength"></div>
        </div>

        <div class="form-group">
            <label for="confirm_password">
                确认密码 <span class="required">*</span>
            </label>
            <input
                type="password"
                id="confirm_password"
                name="confirm_password"
                placeholder="请再次输入密码"
                minlength="6"
                required
                autocomplete="new-password"
            >
        </div>

        <div class="form-group">
            <label for="email">邮箱（可选）</label>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="example@email.com"
                autocomplete="email"
            >
        </div>

        <button type="submit" class="btn" id="submitBtn">
            立即注册
        </button>

        <div class="terms">
            点击注册即表示您同意我们的
            <a href="#">服务条款</a> 和
            <a href="#">隐私政策</a>
        </div>
    </form>

    <div class="login-link">
        已有账号？<a href="/login">立即登录</a>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const form = document.getElementById('registerForm');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirm_password');
    const strengthFill = document.getElementById('strengthFill');
    const strengthText = document.getElementById('strengthText');
    const alert = document.getElementById('alert');
    const submitBtn = document.getElementById('submitBtn');

    // 密码强度检测
    passwordInput.addEventListener('input', function() {
        const password = this.value;
        let strength = 0;

        if (password.length >= 6) strength++;
        if (password.length >= 10) strength++;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
        if (/\d/.test(password)) strength++;
        if (/[^a-zA-Z0-9]/.test(password)) strength++;

        strengthFill.className = 'strength-fill';

        if (strength <= 2) {
            strengthFill.classList.add('strength-weak');
            strengthText.textContent = '密码强度：弱';
            strengthText.style.color = '#f56565';
        } else if (strength <= 3) {
            strengthFill.classList.add('strength-medium');
            strengthText.textContent = '密码强度：中';
            strengthText.style.color = '#ed8936';
        } else {
            strengthFill.classList.add('strength-strong');
            strengthText.textContent = '密码强度：强';
            strengthText.style.color = '#48bb78';
        }
    });

    // 表单提交
    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm_password').value;
        const email = document.getElementById('email').value;

        // 前端验证
        if (password !== confirmPassword) {
            showAlert('两次输入的密码不一致', 'error');
            return;
        }

        if (password.length < 6) {
            showAlert('密码长度至少为6个字符', 'error');
            return;
        }

        // 禁用按钮，显示加载状态
        submitBtn.disabled = true;
        submitBtn.innerHTML = '注册中<span class="loading"></span>';

        try {
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: username,
                    password: password,
                    email: email || null
                })
            });

            const result = await response.json();

            if (result.success) {
                showAlert('注册成功！正在跳转到登录页面...', 'success');
                setTimeout(() => {
                    window.location.href = '/login';
                }, 1500);
            } else {
                showAlert(result.message || '注册失败，请重试', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '立即注册';
            }
        } catch (error) {
            console.error('注册错误:', error);
            showAlert('网络错误，请检查连接后重试', 'error');
            submitBtn.disabled = false;
            submitBtn.innerHTML = '立即注册';
        }
    });

    // 显示提示信息
    function showAlert(message, type) {
        alert.textContent = message;
        alert.className = `alert alert-${type}`;
        alert.style.display = 'block';

        // 3秒后自动隐藏成功提示
        if (type === 'success') {
            setTimeout(() => {
                alert.style.display = 'none';
            }, 3000);
        }
    }

    // 实时验证密码匹配
    confirmPasswordInput.addEventListener('input', function() {
        if (this.value && this.value !== passwordInput.value) {
            this.style.borderColor = '#f56565';
        } else {
            this.style.borderColor = '#e2e8f0';
        }
    });
</script>
{% endblock %}
