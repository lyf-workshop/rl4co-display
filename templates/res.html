<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - RL4CO 强化学习平台 | 山西大学</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #188754 0%, #156b43 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .left-panel {
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header {
            margin-bottom: 2rem;
        }

        .form-header h2 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .form-header p {
            color: #666;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
            background: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: #188754;
            box-shadow: 0 0 0 3px rgba(24, 135, 84, 0.1);
        }

        .password-hint {
            font-size: 0.85rem;
            color: #999;
            margin-top: 0.3rem;
        }

        .submit-button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #188754 0%, #156b43 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(24, 135, 84, 0.4);
        }

        .submit-button:active {
            transform: translateY(0);
        }

        .form-footer {
            margin-top: 1.5rem;
            text-align: center;
            color: #666;
        }

        .form-footer a {
            color: #188754;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .form-footer a:hover {
            color: #156b43;
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: #999;
            font-size: 0.9rem;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .divider::before {
            margin-right: 1rem;
        }

        .divider::after {
            margin-left: 1rem;
        }

        .right-panel {
            background: linear-gradient(135deg, #188754 0%, #156b43 100%);
            padding: 3rem;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .logo-section {
            margin-bottom: 2rem;
        }

        .logo-section h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .logo-section .subtitle {
            font-size: 1.1rem;
            opacity: 0.95;
            margin-bottom: 0.5rem;
        }

        .university-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            margin-top: 1rem;
            backdrop-filter: blur(10px);
        }

        .benefits-list {
            margin-top: 2rem;
            text-align: left;
        }

        .benefit-item {
            display: flex;
            align-items: flex-start;
            margin: 1rem 0;
            font-size: 0.95rem;
        }

        .benefit-icon {
            display: inline-block;
            width: 28px;
            height: 28px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            margin-right: 0.8rem;
            text-align: center;
            line-height: 28px;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        @media (max-width: 768px) {
            .register-container {
                grid-template-columns: 1fr;
            }

            .left-panel {
                padding: 2rem;
            }

            .right-panel {
                padding: 2rem;
            }

            .benefits-list {
                display: none;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-container {
            animation: fadeInUp 0.6s ease-out;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="left-panel">
            <div class="form-header">
                <h2>创建新账户</h2>
                <p>加入 RL4CO 强化学习平台，开启您的研究之旅</p>
            </div>

            <form action="/register" method="post">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请设置您的用户名" required />
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请设置您的密码" required />
                    <div class="password-hint">建议使用字母、数字和符号的组合</div>
                </div>

                <button type="submit" class="submit-button">立即注册</button>
            </form>

            <div class="divider">或</div>

            <div class="form-footer">
                <p>已经有账户？<a href="/">返回登录</a></p>
            </div>
        </div>

        <div class="right-panel">
            <div class="logo-section">
                <h1>🚀 RL4CO</h1>
                <p class="subtitle">强化学习组合优化平台</p>
                <p class="subtitle">Reinforcement Learning for CO</p>
                <div class="university-badge">🎓 山西大学 · RL4CO</div>
            </div>
            <div class="benefits-list">
                <div class="benefit-item">
                    <div class="benefit-icon">🎯</div>
                    <div>访问多种先进的强化学习模型，包括 POMO、SymNCO 等</div>
                </div>
                <div class="benefit-item">
                    <div class="benefit-icon">📊</div>
                    <div>实时监控训练过程，掌握模型性能变化</div>
                </div>
                <div class="benefit-item">
                    <div class="benefit-icon">⚙️</div>
                    <div>灵活配置训练参数，满足不同研究需求</div>
                </div>
                <div class="benefit-item">
                    <div class="benefit-icon">🔬</div>
                    <div>适用于 TSP、VRP 等经典组合优化问题</div>
                </div>
    </div>
    </div>
    </div>
</body>
</html>
