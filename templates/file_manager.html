{% extends "base.html" %}

{% block title %}训练文件管理 - RL4CO 平台 | 山西大学{% endblock %}

{% block head %}
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #333;
        min-height: 100vh;
    }

    /* 主容器 */
    .container {
        max-width: 1400px;
        margin: 100px auto 50px;
        padding: 0 2rem;
    }

    .page-header {
        background: white;
        border-radius: 20px;
        padding: 2.5rem;
        margin-bottom: 2rem;
        box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        text-align: center;
    }

    .page-header h1 {
        font-size: 2.5rem;
        color: #667eea;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
    }

    .page-header .subtitle {
        font-size: 1.1rem;
        color: #666;
    }

    .content-card {
        background: white;
        border-radius: 20px;
        padding: 2.5rem;
        box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    .header-icon {
        font-size: 2.5rem;
    }

    .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 2rem;
    }

    .stat-card {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 1.5rem;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
        transition: transform 0.3s;
    }

    .stat-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
    }

    .stat-value {
        font-size: 2rem;
        font-weight: bold;
        margin-bottom: 0.5rem;
    }

    .stat-label {
        font-size: 0.9rem;
        opacity: 0.95;
    }

    .action-bar {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
        flex-wrap: wrap;
        justify-content: center;
    }

    .btn {
        padding: 0.8rem 1.5rem;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-weight: 500;
    }

    .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-danger {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        color: white;
    }

    .btn-danger:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
    }

    .btn-secondary {
        background: #6c757d;
        color: white;
    }

    .btn-secondary:hover {
        background: #5a6268;
        transform: translateY(-2px);
    }

    .section {
        margin-bottom: 3rem;
    }

    .section-title {
        font-size: 1.8rem;
        color: #333;
        margin-bottom: 1.5rem;
        padding-bottom: 0.8rem;
        border-bottom: 3px solid #667eea;
        display: flex;
        align-items: center;
        gap: 0.8rem;
        font-weight: 600;
    }

    /* 训练会话卡片容器 */
    .sessions-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(800px, 1fr));
        gap: 30px;
    }

    /* 训练会话卡片 */
    .session-card {
        background: white;
        border: 3px solid #e9ecef;
        border-radius: 20px;
        padding: 30px;
        transition: all 0.3s;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
    }

    .session-card:hover {
        border-color: #667eea;
        box-shadow: 0 10px 35px rgba(102, 126, 234, 0.25);
        transform: translateY(-5px);
    }

    /* 会话头部 */
    .session-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        padding: 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 12px;
        color: white;
    }

    .session-info {
        flex: 1;
    }

    .session-title {
        font-size: 1.4rem;
        font-weight: bold;
        color: white;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .session-meta {
        font-size: 0.95rem;
        color: rgba(255, 255, 255, 0.9);
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
    }

    .session-status {
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: bold;
        text-transform: uppercase;
    }

    .status-completed {
        background: #28a745;
        color: white;
    }

    .status-running {
        background: #ffc107;
        color: #333;
    }

    .status-failed {
        background: #dc3545;
        color: white;
    }

    /* 文件网格（在会话卡片内） */
    .file-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }

    .file-item {
        background: white;
        border: 2px solid #e9ecef;
        border-radius: 12px;
        overflow: hidden;
        transition: all 0.3s;
        position: relative;
    }

    .file-item:hover {
        border-color: #667eea;
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.2);
        transform: translateY(-3px);
    }

    /* 文件预览图 */
    .file-preview-img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        background: #f8f9fa;
        cursor: pointer;
        transition: transform 0.3s;
    }

    .file-preview-img:hover {
        transform: scale(1.05);
    }

    /* 文件信息区域 */
    .file-item-info {
        padding: 15px;
        text-align: center;
    }

    /* 占位图（文件不存在时） */
    .file-placeholder {
        width: 100%;
        height: 200px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        opacity: 0.5;
    }

    .file-placeholder-icon {
        font-size: 60px;
        margin-bottom: 10px;
    }

    .file-card {
        background: #f8f9fa;
        border: 2px solid #e9ecef;
        border-radius: 12px;
        padding: 20px;
        transition: all 0.3s;
        position: relative;
    }

    .file-card:hover {
        border-color: #667eea;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        transform: translateY(-2px);
    }

    .file-type-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: bold;
        text-transform: uppercase;
        margin-bottom: 10px;
    }

    .badge-comparison {
        background: #17a2b8;
        color: white;
    }

    .badge-animation {
        background: #28a745;
        color: white;
    }

    .badge-curve {
        background: #ffc107;
        color: #333;
    }

    .badge-checkpoint {
        background: #dc3545;
        color: white;
    }

    .file-icon {
        font-size: 48px;
        margin-bottom: 10px;
    }

    .file-name {
        font-weight: bold;
        color: #333;
        margin-bottom: 10px;
        word-break: break-all;
        padding-right: 100px;
    }

    .file-info {
        font-size: 14px;
        color: #6c757d;
        margin-bottom: 15px;
    }

    .file-preview {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 15px;
        background: #e9ecef;
    }

    .file-actions {
        display: flex;
        gap: 10px;
    }

    .btn-small {
        padding: 8px 16px;
        font-size: 14px;
        flex: 1;
    }

    .btn-view {
        background: #17a2b8;
        color: white;
    }

    .btn-view:hover {
        background: #138496;
    }

    .btn-delete {
        background: #dc3545;
        color: white;
    }

    .btn-delete:hover {
        background: #c82333;
    }

    .loading {
        text-align: center;
        padding: 40px;
        font-size: 18px;
        color: #6c757d;
    }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #6c757d;
    }

    .empty-state-icon {
        font-size: 80px;
        margin-bottom: 20px;
        opacity: 0.5;
    }

    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        z-index: 1000;
        justify-content: center;
        align-items: center;
    }

    .modal.active {
        display: flex;
    }

    .modal-content {
        background: white;
        padding: 30px;
        border-radius: 15px;
        max-width: 500px;
        width: 90%;
        text-align: center;
    }

    .modal-icon {
        font-size: 60px;
        margin-bottom: 20px;
    }

    .modal-title {
        font-size: 24px;
        margin-bottom: 15px;
        color: #333;
    }

    .modal-message {
        font-size: 16px;
        color: #6c757d;
        margin-bottom: 30px;
    }

    .modal-actions {
        display: flex;
        gap: 15px;
        justify-content: center;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .spinner {
        display: inline-block;
        animation: spin 1s linear infinite;
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <!-- 页面标题 -->
    <div class="page-header">
        <h1>
            <span class="header-icon">🗂️</span>
            训练文件管理
        </h1>
        <p class="subtitle">管理您的训练结果、可视化文件和模型检查点</p>
    </div>

    <!-- 主内容卡片 -->
    <div class="content-card">
        <!-- 统计信息 -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalSessions">-</div>
                <div class="stat-label">训练会话数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalFiles">-</div>
                <div class="stat-label">总文件数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalSize">-</div>
                <div class="stat-label">占用空间 (MB)</div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="action-bar">
            <button class="btn btn-primary" onclick="loadFiles()">
                <span>🔄</span> 刷新列表
            </button>
            <button class="btn btn-danger" onclick="confirmClearAll()">
                <span>🗑️</span> 清空所有文件
            </button>
        </div>

        <!-- 训练会话列表（按会话分组） -->
        <div class="section">
            <h2 class="section-title">
                <span>📦</span> 训练会话文件
            </h2>
            <div id="sessionsList" class="sessions-grid">
                <div class="loading">
                    <span class="spinner">⏳</span> 加载中...
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 确认对话框 -->
<div id="confirmModal" class="modal">
    <div class="modal-content">
        <div class="modal-icon">⚠️</div>
        <div class="modal-title" id="modalTitle">确认操作</div>
        <div class="modal-message" id="modalMessage">此操作不可撤销，确定要继续吗？</div>
        <div class="modal-actions">
            <button class="btn btn-danger" id="confirmBtn">确认</button>
            <button class="btn btn-back" onclick="closeModal()">取消</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let sessionsData = null;

    // 页面加载时获取文件列表
    document.addEventListener('DOMContentLoaded', () => {
        loadFiles();
    });

    // 加载文件列表（按会话分组）
    async function loadFiles() {
        try {
            const response = await fetch('/api/list_files');
            const data = await response.json();

            if (data.success) {
                sessionsData = data.sessions;
                updateStats(data);
                renderSessions(data.sessions);
            } else {
                alert('加载文件列表失败: ' + data.message);
            }
        } catch (error) {
            console.error('加载文件列表出错:', error);
            alert('加载文件列表失败');
        }
    }

    // 更新统计信息
    function updateStats(data) {
        document.getElementById('totalSessions').textContent = data.total_sessions || 0;
        document.getElementById('totalFiles').textContent = data.total_files || 0;
        document.getElementById('totalSize').textContent = data.total_size_mb || 0;
    }

    // 渲染训练会话列表（分组展示）
    function renderSessions(sessions) {
        const container = document.getElementById('sessionsList');

        if (!sessions || sessions.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <div>暂无训练记录</div>
                    <p style="margin-top: 10px; color: #999;">开始一次训练后，相关文件会在这里显示</p>
                </div>
            `;
            return;
        }

        container.innerHTML = sessions.map(session => {
            const files = session.files;
            const statusClass = `status-${session.status}`;
            const statusText = {
                'completed': '✅ 已完成',
                'running': '⏳ 进行中',
                'failed': '❌ 失败'
            }[session.status] || session.status;

            return `
            <div class="session-card">
                <!-- 会话头部 -->
                <div class="session-header">
                    <div class="session-info">
                        <div class="session-title">
                            🤖 ${session.model_type}
                            <span style="color: #667eea;">|</span>
                            🎯 ${session.problem_type.toUpperCase()}
                        </div>
                        <div class="session-meta">
                            <span>🕒 ${session.start_time}</span>
                            <span>📦 ${session.file_count} 个文件</span>
                            <span>💾 ${session.total_size_mb} MB</span>
                        </div>
                    </div>
                    <span class="session-status ${statusClass}">${statusText}</span>
                </div>

                <!-- 文件网格 -->
                <div class="file-grid">
                    ${renderFileItem(files.comparison, 'comparison', '📊 对比图', session.session_id)}
                    ${renderFileItem(files.animation, 'animation', '🎬 动态GIF', session.session_id)}
                    ${renderFileItem(files.curve, 'curve', '📈 训练曲线', session.session_id)}
                    ${renderFileItem(files.checkpoint, 'checkpoint', '💾 检查点', session.session_id)}
                </div>

                <!-- 会话操作 -->
                <div style="margin-top: 20px; text-align: right;">
                    <button class="btn btn-small btn-danger" onclick="confirmDeleteSession('${session.session_id}', ${session.file_count})">
                        🗑️ 删除整个训练
                    </button>
                </div>
            </div>
            `;
        }).join('');
    }

    // 渲染单个文件项（带图片预览）
    function renderFileItem(file, type, label, sessionId) {
        // 文件不存在时显示占位符
        if (!file) {
            const placeholderIcon = {
                'comparison': '📊',
                'animation': '🎬',
                'curve': '📈',
                'checkpoint': '💾'
            }[type] || '📄';

            return `
                <div class="file-item" style="opacity: 0.6;">
                    <div class="file-placeholder">
                        <div class="file-placeholder-icon">${placeholderIcon}</div>
                        <div style="color: #999; font-weight: bold;">未生成</div>
                    </div>
                    <div class="file-item-info">
                        <div class="file-type-badge badge-${type}">${label}</div>
                        <div style="color: #999; font-size: 12px; margin-top: 5px;">
                            此文件尚未生成
                        </div>
                    </div>
                </div>
            `;
        }

        // 文件存在时显示预览图或图标
        const isImage = type !== 'checkpoint';

        return `
        <div class="file-item">
            ${isImage ?
                // 图片类型：显示预览图
                `<img src="${file.path}"
                     class="file-preview-img"
                     alt="${label}"
                     onclick="viewFile('${file.path}')"
                     onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext y=%22.9em%22 font-size=%2260%22%3E📊%3C/text%3E%3C/svg%3E';"
                     title="点击查看大图">` :
                // 检查点：显示图标占位
                `<div class="file-placeholder" style="opacity: 1; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                    <div class="file-placeholder-icon" style="font-size: 80px;">💾</div>
                </div>`
            }

            <div class="file-item-info">
                <div class="file-type-badge badge-${type}">${label}</div>
                <div style="font-size: 13px; color: #666; margin: 8px 0; font-weight: 500;">
                    ${file.size_mb} MB
                </div>
                <div style="display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 10px;">
                    ${isImage ?
                        `<button class="btn btn-small btn-view" onclick="viewFile('${file.path}')" title="在新标签页查看">
                            👁️ 查看
                        </button>` : ''}
                    ${type === 'checkpoint' ?
                        `<button class="btn btn-small" style="background: #28a745; color: white;" onclick="downloadCheckpoint('${file.name}')" title="下载检查点文件">
                            📥 下载
                        </button>` :
                        `<button class="btn btn-small" style="background: #28a745; color: white;" onclick="downloadFile('${file.path}', '${file.name}')" title="下载文件">
                            📥 下载
                        </button>`}
                    <button class="btn btn-small btn-delete" onclick="confirmDelete('${file.id}', '${file.name}', '${type}')" title="删除此文件">
                        🗑️ 删除
                    </button>
                </div>
            </div>
        </div>
        `;
    }

    // 查看文件
    function viewFile(path) {
        window.open(path, '_blank');
    }

    // 确认删除单个文件
    function confirmDelete(fileId, filename, fileType) {
        showModal(
            '确认删除',
            `确定要删除文件 "${filename}" 吗？此操作不可撤销。`,
            () => deleteFile(fileId, filename, fileType)
        );
    }

    // 删除单个文件
    async function deleteFile(fileId, filename, fileType) {
        try {
            // 优先使用file_id，如果没有则使用filename
            const requestBody = fileId ?
                { file_id: fileId } :
                { filename: filename, file_type: fileType };

            const response = await fetch('/api/delete_file', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });

            const data = await response.json();

            if (data.success) {
                alert('✅ ' + data.message);
                loadFiles(); // 重新加载列表
            } else {
                alert('❌ ' + data.message);
            }
        } catch (error) {
            console.error('删除文件出错:', error);
            alert('删除文件失败');
        }
        closeModal();
    }

    // 下载文件
    function downloadFile(filePath, filename) {
        // 创建一个隐藏的a标签进行下载
        const link = document.createElement('a');
        link.href = filePath;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // 下载检查点文件
    async function downloadCheckpoint(filename) {
        try {
            const response = await fetch(`/api/download_checkpoint/${encodeURIComponent(filename)}`);

            if (!response.ok) {
                const data = await response.json();
                alert('❌ 下载失败: ' + data.message);
                return;
            }

            // 创建blob并下载
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);

            alert('✅ 开始下载: ' + filename);
        } catch (error) {
            console.error('下载检查点文件出错:', error);
            alert('❌ 下载失败');
        }
    }

    // 确认删除整个训练会话
    function confirmDeleteSession(sessionId, fileCount) {
        showModal(
            '⚠️ 删除训练会话',
            `确定要删除这次训练的所有 ${fileCount} 个文件吗？此操作不可撤销！`,
            () => deleteSession(sessionId)
        );
    }

    // 删除整个训练会话
    async function deleteSession(sessionId) {
        try {
            const response = await fetch('/api/delete_session', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessionId })
            });

            const data = await response.json();

            if (data.success) {
                alert('✅ ' + data.message);
                loadFiles(); // 重新加载列表
            } else {
                alert('❌ ' + data.message);
            }
        } catch (error) {
            console.error('删除会话出错:', error);
            alert('删除会话失败');
        }
        closeModal();
    }

    // 确认清空所有文件
    function confirmClearAll() {
        if (!sessionsData || sessionsData.length === 0) {
            alert('当前没有文件可以清空');
            return;
        }

        const totalFiles = sessionsData.reduce((sum, s) => sum + s.file_count, 0);

        showModal(
            '⚠️ 危险操作',
            `确定要清空所有 ${sessionsData.length} 次训练的 ${totalFiles} 个文件吗？此操作不可撤销！`,
            clearAllFiles
        );
    }

    // 清空所有文件
    async function clearAllFiles() {
        try {
            const response = await fetch('/api/clear_all_files', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ confirm: true })
            });

            const data = await response.json();

            if (data.success) {
                alert('✅ ' + data.message);
                loadFiles(); // 重新加载列表
            } else {
                alert('❌ ' + data.message);
            }
        } catch (error) {
            console.error('清空文件出错:', error);
            alert('清空文件失败');
        }
        closeModal();
    }

    // 显示确认对话框
    function showModal(title, message, confirmCallback) {
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalMessage').textContent = message;
        document.getElementById('confirmModal').classList.add('active');

        // 设置确认按钮的回调
        document.getElementById('confirmBtn').onclick = confirmCallback;
    }

    // 关闭对话框
    function closeModal() {
        document.getElementById('confirmModal').classList.remove('active');
    }
</script>
{% endblock %}
