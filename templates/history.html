{% extends "base.html" %}

{% block title %}RL4CO - 强化学习优化平台 | 山西大学{% endblock %}

{% block head %}
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #333;
        min-height: 100vh;
    }

    .config-card {
        background: white;
        border-radius: 15px;
        padding: 2rem;
        box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        transition: transform 0.3s, box-shadow 0.3s;
    }

    .config-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .config-card h3 {
        color: #667eea;
        font-size: 1.5rem;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .icon {
        font-size: 1.8rem;
    }

    .description {
        color: #666;
        font-size: 0.85rem;
        margin-top: 0.5rem;
        line-height: 1.4;
    }

    .start-button {
        width: 100%;
        padding: 1.2rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1.2rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        margin-top: 1rem;
    }

    .start-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .start-button:active {
        transform: translateY(0);
    }
</style>
{% endblock %}

{% block content %}
<div class="config-card">
    <h3><span class="icon">📚</span> 模型知识库</h3>
    <p class="description">探索 20+ 种强化学习组合优化模型</p>
    <div style="text-align: center; padding: 2rem 0;">
        <div style="font-size: 4rem; margin-bottom: 1rem;">📖</div>
        <p style="color: #666; margin-bottom: 1.5rem;">
            查看所有可用模型的详细信息、<br>
            论文出处和性能数据
        </p>
    </div>
    <button type="button" class="start-button" onclick="window.location.href='/model_info'" style="margin-top: 0.5rem;">
        <span class="icon">🔍</span> 浏览模型知识库
    </button>
</div>
{% endblock %}
